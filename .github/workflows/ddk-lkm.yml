name: Build ReKernel-X LKM Target

on:
  workflow_call:
    inputs:
      kmi:
        description: 'KMI version'
        required: true
        type: string
      ddk_release:
        description: 'DDK release version'
        required: false
        default: '20260313'
        type: string
      version:
        description: 'ReKernel-X version'
        required: false
        default: 'dev'
        type: string

jobs:
  build-rekernel_x-ko:
    name: Build rekernel_x.ko for ${{ inputs.kmi }}-${{ inputs.ddk_release }}
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/ylarod/ddk:${{ inputs.kmi }}-${{ inputs.ddk_release }}
      options: --privileged

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Build rekernel_x.ko
        shell: bash
        run: |
          set -euo pipefail

          KMI="${{ inputs.kmi }}"
          DDK_RELEASE="${{ inputs.ddk_release }}"
          RKX_VERSION="${{ inputs.version }}"

          KERNEL_DIR="/opt/ddk/kdir/$KMI"
          SOURCE_ROOT="/opt/ddk/src/$KMI"
          SOURCE_DIR="$SOURCE_ROOT/drivers/rekernel_x"
          MODULE_PATH="$SOURCE_DIR/rekernel_x.ko"

          OUTPUT_DIR="/github/workspace/out"
          OUTPUT_NAME="rekernel_x-${KMI}-${DDK_RELEASE}.ko"
          OUTPUT_PATH="$OUTPUT_DIR/$OUTPUT_NAME"

          echo "============================================"
          echo "ReKernel-X LKM build configuration"
          echo "============================================"
          echo "KMI:          $KMI"
          echo "DDK release:  $DDK_RELEASE"
          echo "RKX version:  $RKX_VERSION"
          echo "Kernel dir:   $KERNEL_DIR"
          echo "Source dir:   $SOURCE_DIR"
          echo "Module path:  $MODULE_PATH"
          echo "Output path:  $OUTPUT_PATH"
          echo "============================================"

          echo "=== Checking required directories ==="

          if [[ ! -d "$KERNEL_DIR" ]]; then
            echo "ERROR: Kernel build directory does not exist:"
            echo "  $KERNEL_DIR"
            exit 1
          fi

          if [[ ! -d "$SOURCE_ROOT" ]]; then
            echo "ERROR: DDK source directory does not exist:"
            echo "  $SOURCE_ROOT"
            exit 1
          fi

          if [[ ! -d "./LKM-Source" ]]; then
            echo "ERROR: Repository source directory does not exist:"
            echo "  ./LKM-Source"
            exit 1
          fi

          if [[ ! -f "./LKM-Source/Makefile" ]]; then
            echo "ERROR: Module Makefile does not exist:"
            echo "  ./LKM-Source/Makefile"
            exit 1
          fi

          echo "=== Checking required source files ==="

          REQUIRED_SOURCES=(
            "rkx.c"
            "rkx_genl.c"
            "rkx_netuid.c"
            "rkx_frozen.c"
            "rkx_binder.c"
            "rkx_signal.c"
            "rkx_netfilter.c"
            "rkx_binder_kp.c"
            "rkx_binder_alloc.c"
          )

          MISSING_SOURCE=0

          for source_file in "${REQUIRED_SOURCES[@]}"; do
            if [[ ! -f "./LKM-Source/$source_file" ]]; then
              echo "ERROR: Missing source file:"
              echo "  ./LKM-Source/$source_file"
              MISSING_SOURCE=1
            else
              echo "Found: ./LKM-Source/$source_file"
            fi
          done

          if [[ "$MISSING_SOURCE" -ne 0 ]]; then
            echo "ERROR: One or more required source files are missing."
            exit 1
          fi

          echo "=== Preparing source directory ==="

          # Remove the old destination first. Without this step, cp may create:
          #
          #   drivers/rekernel_x/LKM-Source
          #
          # instead of replacing drivers/rekernel_x.
          rm -rf "$SOURCE_DIR"
          mkdir -p "$(dirname "$SOURCE_DIR")"
          cp -a "./LKM-Source" "$SOURCE_DIR"

          echo "=== Copied source files ==="
          find "$SOURCE_DIR" \
            -maxdepth 1 \
            -type f \
            -printf '%f\n' \
            | sort

          echo "=== Module Makefile ==="
          cat "$SOURCE_DIR/Makefile"

          echo "=== Checking Makefile object names ==="

          REQUIRED_OBJECTS=(
            "rkx.o"
            "rkx_genl.o"
            "rkx_netuid.o"
            "rkx_frozen.o"
            "rkx_binder.o"
            "rkx_signal.o"
            "rkx_netfilter.o"
            "rkx_binder_kp.o"
            "rkx_binder_alloc.o"
          )

          for object_file in "${REQUIRED_OBJECTS[@]}"; do
            if ! grep -q "$object_file" "$SOURCE_DIR/Makefile"; then
              echo "ERROR: Makefile does not contain required object:"
              echo "  $object_file"
              exit 1
            fi
          done

          echo "=== Compiler information ==="
          clang --version || true

          echo "=== Building rekernel_x.ko ==="

          cd "$SOURCE_ROOT"

          make -C "$KERNEL_DIR" \
            M="$SOURCE_DIR" \
            CC="clang" \
            KCFLAGS="-fno-stack-protector" \
            EXTRA_CFLAGS="-fno-stack-protector" \
            RKX_VERSION="$RKX_VERSION" \
            V=1 \
            modules

          echo "=== Build completed ==="

          if [[ ! -f "$MODULE_PATH" ]]; then
            echo "ERROR: The kernel module was not generated:"
            echo "  $MODULE_PATH"
            exit 1
          fi

          if [[ ! -s "$MODULE_PATH" ]]; then
            echo "ERROR: The generated kernel module is empty:"
            echo "  $MODULE_PATH"
            exit 1
          fi

          echo "=== Built module information ==="
          ls -lh "$MODULE_PATH"

          if command -v file >/dev/null 2>&1; then
            file "$MODULE_PATH" || true
          fi

          echo "=== Selecting LLVM nm tool ==="

          if command -v llvm-nm >/dev/null 2>&1; then
            NM_TOOL="llvm-nm"
          elif command -v nm >/dev/null 2>&1; then
            NM_TOOL="nm"
          else
            echo "ERROR: Neither llvm-nm nor nm was found."
            exit 1
          fi

          echo "NM tool: $NM_TOOL"

          echo "=== Undefined module symbols before strip ==="
          "$NM_TOOL" -u "$MODULE_PATH" || true

          echo "=== Checking stack protector symbols ==="

          if "$NM_TOOL" -u "$MODULE_PATH" 2>/dev/null \
            | grep -Eq '__stack_chk_guard|__stack_chk_fail'; then

            echo "ERROR: rekernel_x.ko references stack protector symbols:"
            "$NM_TOOL" -u "$MODULE_PATH" 2>/dev/null \
              | grep -E '__stack_chk_guard|__stack_chk_fail' \
              || true

            echo
            echo "=== Locating object files with stack protector references ==="

            while IFS= read -r -d '' object_file; do
              if "$NM_TOOL" -u "$object_file" 2>/dev/null \
                | grep -Eq '__stack_chk_guard|__stack_chk_fail'; then

                echo "Object: $object_file"
                "$NM_TOOL" -u "$object_file" 2>/dev/null \
                  | grep -E '__stack_chk_guard|__stack_chk_fail' \
                  || true
              fi
            done < <(
              find "$SOURCE_DIR" \
                -type f \
                -name '*.o' \
                -print0
            )

            echo
            echo "The module would probably fail to load with:"
            echo "  Unknown symbol __stack_chk_guard"
            exit 1
          fi

          echo "=== OK: no unresolved stack protector symbols found ==="

          echo "=== Preparing artifact ==="

          mkdir -p "$OUTPUT_DIR"
          rm -f "$OUTPUT_PATH"

          cp "$MODULE_PATH" "$OUTPUT_PATH"
          llvm-strip -d "$OUTPUT_PATH"

          if [[ ! -f "$OUTPUT_PATH" ]]; then
            echo "ERROR: The artifact was not generated:"
            echo "  $OUTPUT_PATH"
            exit 1
          fi

          if [[ ! -s "$OUTPUT_PATH" ]]; then
            echo "ERROR: The generated artifact is empty:"
            echo "  $OUTPUT_PATH"
            exit 1
          fi

          echo "=== Checking final artifact ==="

          if "$NM_TOOL" -u "$OUTPUT_PATH" 2>/dev/null \
            | grep -Eq '__stack_chk_guard|__stack_chk_fail'; then

            echo "ERROR: Final artifact references stack protector symbols:"
            "$NM_TOOL" -u "$OUTPUT_PATH" 2>/dev/null \
              | grep -E '__stack_chk_guard|__stack_chk_fail' \
              || true

            exit 1
          fi

          echo "=== Final artifact information ==="
          ls -lh "$OUTPUT_PATH"

          if command -v file >/dev/null 2>&1; then
            file "$OUTPUT_PATH" || true
          fi

          echo "=== Build successful ==="
          echo "Artifact: $OUTPUT_PATH"

      - name: Upload rekernel_x.ko artifact
        uses: actions/upload-artifact@v7
        with:
          name: rekernel_x-${{ inputs.kmi }}-${{ inputs.ddk_release }}.ko
          path: /github/workspace/out/rekernel_x-${{ inputs.kmi }}-${{ inputs.ddk_release }}.ko
          if-no-files-found: error
